<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 7.1</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Typography showcase -->
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="display-1 fw-bold">Bootstrap Typography</h1>
            <p class="lead text-muted">A sample page demonstrating Bootstrap typography utilities.</p>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-3">
                <h2 class="display-3 text-center">Styled Text</h2>
                <p class="fw-bold">This is bold text.</p>
                <p class="fst-italic">This is italic text.</p>
                <p class="text-decoration-underline">This text is underlined.</p>
                <p class="text-muted">This text appears muted.</p>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
