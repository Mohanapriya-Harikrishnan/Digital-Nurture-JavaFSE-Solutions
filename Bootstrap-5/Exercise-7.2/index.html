<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 7.2</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Text transformation section -->
    <div class="container py-5">
        <div class="row">
            <div class="col-md-6">
                <h3 class="text-uppercase">uppercase heading</h3>
                <p class="text-lowercase">LOWERCASE PARAGRAPH</p>
                <p class="text-capitalize">this sentence is capitalized.</p>
            </div>
            <div class="col-md-6">
                <p class="text-start">Left aligned text.</p>
                <p class="text-center">Center aligned text.</p>
                <p class="text-end">Right aligned text.</p>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
