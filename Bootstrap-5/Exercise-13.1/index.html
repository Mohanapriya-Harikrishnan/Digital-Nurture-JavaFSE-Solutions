<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 13.1</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Dashboard section -->
    <div class="container py-5">
        <div class="row g-3">
            <div class="col-md-6 col-lg-3">
                <div class="bg-primary text-white p-4 rounded">
                    <h5>Users</h5>
                    <p class="mb-0">1,250</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="bg-success text-white p-4 rounded">
                    <h5>Revenue</h5>
                    <p class="mb-0">$45k</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="bg-warning text-dark p-4 rounded">
                    <h5>Pending</h5>
                    <p class="mb-0">12</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="bg-danger text-white p-4 rounded">
                    <h5>Issues</h5>
                    <p class="mb-0">4</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="bg-info text-white p-4 rounded">
                    <h5>Traffic</h5>
                    <p class="mb-0">78%</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="bg-secondary text-white p-4 rounded">
                    <h5>Reports</h5>
                    <p class="mb-0">32</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
