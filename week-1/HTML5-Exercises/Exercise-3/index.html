<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Welcome Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        .highlight {
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome to the Community Festival!</h1>
        <p>Enjoy music, food, and fun activities this weekend.</p>
        <p>Our <span class="highlight" style="color: yellow;">special offer</span> is free entry for children.</p>
    </div>
</body>
</html>
