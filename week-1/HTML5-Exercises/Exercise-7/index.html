<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7 - Video Invite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Video Invitation</h1>
        <p>Watch the invitation video for our next community event.</p>
    </header>

    <main>
        <video id="eventVideo" controls width="600" oncanplay="showReadyMessage()">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <p id="videoStatus">Waiting for video...</p>
    </main>

    <script>
        function showReadyMessage() {
            document.getElementById('videoStatus').textContent = 'Video ready to play';
        }

        window.onbeforeunload = function () {
            return 'Are you sure you want to leave this page?';
        };
    </script>
</body>
</html>
