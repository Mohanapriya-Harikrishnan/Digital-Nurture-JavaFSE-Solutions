<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 - Event Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Register for the Community Event</h1>
        <p>Join us for a fun and memorable local celebration.</p>
    </header>

    <main>
        <form id="registrationForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required autofocus>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="date">Preferred Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="eventType">Event Type:</label>
            <select id="eventType" name="eventType">
                <option value="Festival">Festival</option>
                <option value="Workshop">Workshop</option>
                <option value="Market">Market</option>
            </select>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" placeholder="Tell us something about yourself"></textarea>

            <button type="submit">Register</button>

            <output id="confirmation" for="name email eventType"></output>
        </form>
    </main>

    <script>
        const form = document.getElementById('registrationForm');
        const output = document.getElementById('confirmation');

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const eventType = document.getElementById('eventType').value;
            output.value = `Thank you, ${name}! Your registration for the ${eventType} has been received.`;
        });
    </script>
</body>
</html>
