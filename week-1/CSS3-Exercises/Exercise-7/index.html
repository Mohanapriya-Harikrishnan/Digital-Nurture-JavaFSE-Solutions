<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7 - Table Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="table-wrapper">
        <h1>Events Schedule</h1>
        <table>
            <caption>Weekend Activities in the Community</caption>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Event</th>
                    <th>Venue</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>9:00 AM</td>
                    <td>Yoga in the Park</td>
                    <td>Central Green</td>
                </tr>
                <tr>
                    <td>11:00 AM</td>
                    <td>Food Fair</td>
                    <td>Market Square</td>
                </tr>
                <tr>
                    <td>2:00 PM</td>
                    <td>Live Music</td>
                    <td>Town Stage</td>
                </tr>
                <tr>
                    <td>6:00 PM</td>
                    <td>Community Dinner</td>
                    <td>Community Hall</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
