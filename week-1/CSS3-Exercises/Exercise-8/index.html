<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Box Model and Layout Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="cards-container">
        <section class="event-card">
            <h2>Garden Fair</h2>
            <p>Enjoy flower displays and local crafts.</p>
        </section>

        <section class="event-card highlighted-card">
            <h2>Street Parade</h2>
            <p>Celebrate with music, food, and family fun.</p>
        </section>

        <section class="hidden-card">
            <h2>Hidden Event</h2>
            <p>This card uses visibility: hidden.</p>
        </section>

        <section class="removed-card">
            <h2>Removed Event</h2>
            <p>This card uses display: none.</p>
        </section>
    </main>
</body>
</html>
