<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10 - Responsive Web Design</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">Events</a>
            <a href="#">News</a>
            <a href="#">Contact</a>
        </nav>
        <h1>Neighborhood Festival</h1>
        <p>Celebrate local talent, food, and community spirit.</p>
    </header>

    <main class="content-area">
        <section class="card">
            <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80" alt="Community event gathering">
            <h2>Community Gatherings</h2>
            <p>Join neighbors for music, food, and hands-on activities.</p>
        </section>

        <section class="card">
            <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=800&q=80" alt="Local market scene">
            <h2>Market Day</h2>
            <p>Support local vendors and discover handmade treasures.</p>
        </section>
    </main>
</body>
</html>
