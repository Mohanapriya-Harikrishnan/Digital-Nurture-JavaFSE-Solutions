<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 12.2</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Pricing section -->
    <div class="container py-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h4>Basic</h4>
                    <p class="text-muted">Perfect for starters</p>
                    <h2>$9</h2>
                    <p class="mb-4">1 Project</p>
                    <button class="btn btn-outline-primary">Choose Plan</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4 border-primary">
                    <h4>Pro</h4>
                    <p class="text-muted">Best for growing teams</p>
                    <h2>$29</h2>
                    <p class="mb-4">10 Projects</p>
                    <button class="btn btn-primary">Choose Plan</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h4>Enterprise</h4>
                    <p class="text-muted">For large organizations</p>
                    <h2>$99</h2>
                    <p class="mb-4">Unlimited Projects</p>
                    <button class="btn btn-outline-primary">Choose Plan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
