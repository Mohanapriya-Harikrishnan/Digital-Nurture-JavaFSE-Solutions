<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 15.2</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Card with shadow and rounded-pill buttons -->
    <div class="container py-5">
        <div class="card shadow shadow-lg p-4 rounded">
            <h3 class="card-title">Featured Product</h3>
            <p class="card-text">A modern card using Bootstrap shadow utilities and pill-shaped buttons.</p>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary rounded-pill">Buy Now</button>
                <button class="btn btn-outline-secondary rounded-pill">Learn More</button>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
