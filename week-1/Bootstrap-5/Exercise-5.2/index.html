<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 5.2</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
</head>
<body>
    <!-- Main content section -->
    <div class="container mt-5">
        <!-- Responsive column layout -->
        <div class="row">
            <!-- First column -->
            <div class="col-md-4 order-md-2 mb-3">
                <div class="bg-primary text-white p-3 text-center">
                    <h3>First Column</h3>
                    <p>Order changes on medium screens.</p>
                </div>
            </div>

            <!-- Second column -->
            <div class="col-md-4 order-md-1 mb-3">
                <div class="bg-success text-white p-3 text-center">
                    <h3>Second Column</h3>
                    <p>Reordered on medium screens.</p>
                </div>
            </div>

            <!-- Third column -->
            <div class="col-md-4 mb-3">
                <div class="bg-info text-white p-3 text-center">
                    <h3>Third Column</h3>
                    <p>Remains in place.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
