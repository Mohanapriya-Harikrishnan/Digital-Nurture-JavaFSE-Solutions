<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 17.2</title>
    <link rel="stylesheet" href="../Exercise-1.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <!-- Icon-only buttons section -->
    <div class="container py-5">
        <div class="d-flex gap-3 flex-wrap">
            <button class="btn btn-primary rounded-circle" aria-label="Add">
                <i class="bi bi-plus-lg"></i>
            </button>
            <button class="btn btn-success rounded-circle" aria-label="Edit">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-danger rounded-circle" aria-label="Delete">
                <i class="bi bi-trash"></i>
            </button>
            <button class="btn btn-warning rounded-circle" aria-label="Star">
                <i class="bi bi-star-fill"></i>
            </button>
        </div>
    </div>

    <script src="../Exercise-1.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
