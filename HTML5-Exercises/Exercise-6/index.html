<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 - Event Handling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Event Handling Demo</h1>
    </header>

    <main>
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" onblur="validatePhone(this.value)">
        <p id="phoneMessage"></p>

        <label for="eventFee">Choose an Event:</label>
        <select id="eventFee" onchange="showFee(this.value)">
            <option value="0">Select an event</option>
            <option value="10">Music Festival</option>
            <option value="15">Food Fair</option>
            <option value="20">Art Workshop</option>
        </select>
        <p id="feeMessage"></p>

        <button onclick="confirmBooking()">Book Event</button>

        <div>
            <img id="eventImage" src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=600&q=80" alt="Community event" width="250" ondblclick="enlargeImage()">
        </div>

        <label for="comment">Comments:</label>
        <textarea id="comment" rows="4" onkeyup="countCharacters(this.value)"></textarea>
        <p id="charCount">Characters: 0</p>
    </main>

    <script>
        function validatePhone(value) {
            const message = document.getElementById('phoneMessage');
            if (/^\d{10}$/.test(value)) {
                message.textContent = 'Valid phone number.';
            } else {
                message.textContent = 'Please enter exactly 10 digits.';
            }
        }

        function showFee(value) {
            const message = document.getElementById('feeMessage');
            if (value === '0') {
                message.textContent = 'Please select an event.';
            } else {
                message.textContent = `Event fee: $${value}`;
            }
        }

        function confirmBooking() {
            alert('Your event booking has been confirmed!');
        }

        function enlargeImage() {
            const image = document.getElementById('eventImage');
            image.style.width = '350px';
            image.style.transition = 'width 0.3s';
        }

        function countCharacters(value) {
            const count = document.getElementById('charCount');
            count.textContent = `Characters: ${value.length}`;
        }
    </script>
</body>
</html>
