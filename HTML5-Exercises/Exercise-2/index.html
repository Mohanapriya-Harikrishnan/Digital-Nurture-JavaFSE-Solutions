<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Navigation and Linking</title>
</head>
<body>
    <header>
        <h1>Local Community Events</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
        <a href="help.html" target="_blank" rel="noopener noreferrer">Help</a>
    </nav>

    <main>
        <section id="home">
            <h2>Home</h2>
            <p>Welcome to the community event portal.</p>
        </section>

        <section id="events">
            <h2>Events</h2>
            <p>Find upcoming fairs, markets, and workshops here.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>Reach out for event information and support.</p>
        </section>
    </main>
</body>
</html>
